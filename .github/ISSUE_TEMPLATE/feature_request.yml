name: ✨ 기능 요청
description: 새 기능 또는 개선 제안.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 어떤 상황에서 불편한가요?
      description: "왜 이 기능이 필요한지부터 시작해주시면 더 좋은 방향을 찾을 수 있어요."
      placeholder: |
        예) 캡처 후 자동으로 클립보드에 복사되는데, 가끔 클립보드 말고 특정 폴더에만 저장하고 싶을 때가 있어요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 어떻게 해결되면 좋겠어요?
      description: 구체적인 UI/동작 제안이 있다면 적어주세요. 없어도 OK.
      placeholder: |
        예) 단축키 설정 옆에 "클립보드 자동 복사" 토글 추가.

  - type: textarea
    id: alternatives
    attributes:
      label: 다른 방법 / 우회책은 시도해보셨나요?
      description: 선택 입력.
